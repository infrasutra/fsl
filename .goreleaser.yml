version: 2

project_name: fsl

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - id: fsl
    main: ./cmd/fsl
    binary: fsl
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/infrasutra/fsl/cmd/fsl/cmd.Version={{.Version}}
      - -X github.com/infrasutra/fsl/cmd/fsl/cmd.BuildDate={{.Date}}

archives:
  - id: default
    format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

brews:
  - repository:
      owner: infrasutra
      name: homebrew-tap
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    name: fsl
    homepage: https://github.com/infrasutra/fsl
    description: "Flux Schema Language toolkit — parser, LSP, and SDK codegen"
    license: Apache-2.0
    install: |
      bin.install "fsl"
